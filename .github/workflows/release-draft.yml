name: Release – Draft

on:
  workflow_dispatch: # checkov:skip=CKV_GHA_7
    inputs:
      bump-type:
        description: Specify if the version should be bumped as patch, minor, or major
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false
      - name: Get current version
        id: version-file
        run: |
          version_from_file=$(head -n 1 VERSION)
          echo "release-version=$version_from_file" >> $GITHUB_OUTPUT
      - name: Bump version
        id: bump-version
        uses: actions-ecosystem/action-bump-semver@34e334551143a5301f38c830e44a22273c6ff5c5 # v1.0.0
        with:
          current_version: ${{ steps.version-file.outputs.release-version }}
          level: ${{ github.event.inputs.bump-type || 'patch' }}
      - name: Save validated version to file
        run: |
          echo "${{ steps.bump-version.outputs.new_version }}" > VERSION
      - name: Generate changelog from git history
        id: changelog
        uses: ROKT/rokt-workflows/actions/generate-changelog@1859338d7c2c2b873233505c751acbf09fb218d5 # main
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          version: ${{ steps.bump-version.outputs.new_version }}
          changelog-path: CHANGELOG.md

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Rokt.Widget/package-lock.json

      - name: Update package.json version
        working-directory: Rokt.Widget
        run: |
          npm version ${{ steps.bump-version.outputs.new_version }} --no-git-tag-version --allow-same-version

      - name: Update sample apps package.json versions
        run: |
          npm version ${{ steps.bump-version.outputs.new_version }} --no-git-tag-version --allow-same-version --prefix RoktSampleApp
          npm version ${{ steps.bump-version.outputs.new_version }} --no-git-tag-version --allow-same-version --prefix ExpoTestApp
          # Update the @rokt/react-native-sdk dependency version
          sed -i "s|rokt-react-native-sdk-[0-9]\+\.[0-9]\+\.[0-9]\+\.tgz|rokt-react-native-sdk-${{ steps.bump-version.outputs.new_version }}.tgz|g" RoktSampleApp/package.json ExpoTestApp/package.json

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SDK_RELEASE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            rokt-sdk-react-native

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "Prepare release ${{ steps.bump-version.outputs.new_version }}"
          branch: release/${{ steps.bump-version.outputs.new_version }}
          title: "Prepare release ${{ steps.bump-version.outputs.new_version }}"
          base: ${{ github.ref_name }}
          body: |
            Preparing for release ${{ steps.bump-version.outputs.new_version }} from `${{ github.ref_name }}`.
            - Updated package.json to new version
            - Updated CHANGELOG.md
            - Updated VERSION file

            ## Changelog
            ${{ steps.changelog.outputs.release-notes }}
